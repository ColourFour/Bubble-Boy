<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bubble Boy Toybox</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #071423;
        color: #edf3ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        width: 100%;
      }

      body {
        background: #071423;
      }

      body::after {
        background:
          radial-gradient(ellipse at 50% 54%, transparent 0 42%, rgba(2, 8, 18, 0.18) 72%, rgba(0, 0, 0, 0.48) 100%),
          linear-gradient(to right, rgba(0, 0, 0, 0.38), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.32)),
          linear-gradient(to bottom, rgba(4, 12, 28, 0.30), transparent 34%, transparent 72%, rgba(2, 5, 10, 0.28));
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
        z-index: 2;
      }

      .toybox-post-overlay {
        background: none;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        position: absolute;
        z-index: 2;
      }

      canvas {
        display: block;
        height: 100vh;
        position: relative;
        touch-action: none;
        width: 100vw;
        z-index: 0;
      }

      .toybox-stars {
        animation: toybox-star-twinkle 7.4s ease-in-out infinite;
        background:
          radial-gradient(circle at 8% 18%, rgba(242, 248, 255, 0.78) 0 1px, transparent 1.8px),
          radial-gradient(circle at 17% 9%, rgba(174, 205, 255, 0.48) 0 1.4px, transparent 2.4px),
          radial-gradient(circle at 24% 23%, rgba(255, 229, 169, 0.46) 0 1px, transparent 2px),
          radial-gradient(circle at 36% 12%, rgba(221, 235, 255, 0.66) 0 1.2px, transparent 2.2px),
          radial-gradient(circle at 45% 30%, rgba(160, 190, 255, 0.38) 0 1px, transparent 2px),
          radial-gradient(circle at 53% 16%, rgba(255, 247, 212, 0.58) 0 1.4px, transparent 2.6px),
          radial-gradient(circle at 63% 7%, rgba(194, 216, 255, 0.54) 0 1px, transparent 2.1px),
          radial-gradient(circle at 72% 25%, rgba(235, 244, 255, 0.60) 0 1.2px, transparent 2.4px),
          radial-gradient(circle at 83% 13%, rgba(255, 219, 162, 0.46) 0 1px, transparent 2px),
          radial-gradient(circle at 93% 31%, rgba(183, 209, 255, 0.42) 0 1.3px, transparent 2.3px);
        inset: 0;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.74) 46%, rgba(0, 0, 0, 0.18) 66%, transparent 78%);
        -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.74) 46%, rgba(0, 0, 0, 0.18) 66%, transparent 78%);
        mix-blend-mode: screen;
        opacity: 0.46;
        pointer-events: none;
        position: absolute;
        z-index: 1;
      }

      .toybox-stars::after {
        animation: toybox-star-twinkle 5.8s ease-in-out infinite reverse;
        background:
          radial-gradient(circle at 13% 34%, rgba(207, 226, 255, 0.42) 0 1px, transparent 2.2px),
          radial-gradient(circle at 29% 6%, rgba(246, 250, 255, 0.54) 0 1px, transparent 2px),
          radial-gradient(circle at 41% 21%, rgba(255, 236, 192, 0.40) 0 1.4px, transparent 2.5px),
          radial-gradient(circle at 58% 35%, rgba(179, 206, 255, 0.36) 0 1px, transparent 2.2px),
          radial-gradient(circle at 69% 15%, rgba(236, 246, 255, 0.52) 0 1px, transparent 2px),
          radial-gradient(circle at 88% 7%, rgba(163, 194, 255, 0.36) 0 1.6px, transparent 2.8px);
        content: "";
        inset: 0;
        opacity: 0.62;
        position: absolute;
      }

      @keyframes toybox-star-twinkle {
        0%,
        100% {
          filter: brightness(0.86);
          opacity: 0.32;
        }

        48% {
          filter: brightness(1.18);
          opacity: 0.58;
        }
      }

      .toybox-hud {
        backdrop-filter: blur(14px);
        background: rgba(7, 15, 25, 0.42);
        border: 1px solid rgba(196, 178, 128, 0.20);
        border-radius: 12px;
        bottom: 18px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
        color: #d8e6ff;
        font-size: 0.84rem;
        left: 18px;
        line-height: 1.34;
        max-width: min(310px, calc(100% - 36px));
        padding: 0.62rem 0.72rem;
        pointer-events: none;
        position: absolute;
        z-index: 3;
      }

      .toybox-hud strong {
        color: #ffd56f;
        display: block;
        font-size: 0.70rem;
        letter-spacing: 0.14em;
        margin-bottom: 0.22rem;
        text-transform: uppercase;
      }

      .toybox-meta {
        color: #7fbbef;
        font-size: 0.68rem;
        margin-top: 0.36rem;
        text-transform: uppercase;
      }

      .toybox-error {
        align-items: center;
        background:
          radial-gradient(circle at 30% 15%, rgba(255, 204, 102, 0.18), transparent 24rem),
          #050915;
        color: #edf3ff;
        display: none;
        inset: 0;
        justify-content: center;
        padding: 2rem;
        position: absolute;
        text-align: center;
        z-index: 4;
      }

      .toybox-error.is-visible {
        display: flex;
      }

      .toybox-fullscreen-toggle,
      .toybox-debug-toggle,
      .toybox-debug-panel {
        backdrop-filter: blur(12px);
        background: rgba(7, 15, 25, 0.50);
        border: 1px solid rgba(196, 178, 128, 0.16);
        color: #d8e6ff;
        position: absolute;
        right: 18px;
        z-index: 3;
      }

      .toybox-fullscreen-toggle {
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.68rem;
        opacity: 0.74;
        padding: 0.40rem 0.58rem;
        top: 18px;
        transition:
          background 180ms ease,
          border-color 180ms ease,
          opacity 220ms ease;
      }

      .toybox-fullscreen-toggle:hover,
      .toybox-fullscreen-toggle:focus-visible,
      .is-toybox-active .toybox-fullscreen-toggle {
        background: rgba(10, 24, 40, 0.68);
        border-color: rgba(218, 201, 148, 0.28);
        opacity: 1;
      }

      .toybox-debug-toggle {
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.68rem;
        padding: 0.40rem 0.58rem;
        top: 58px;
      }

      .toybox-debug-panel {
        border-radius: 10px;
        display: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.68rem;
        line-height: 1.42;
        max-width: min(280px, calc(100% - 28px));
        padding: 0.58rem 0.68rem;
        pointer-events: none;
        top: 98px;
        white-space: pre-line;
      }

      .toybox-debug-panel.is-visible {
        display: block;
      }

      .toybox-controls {
        backdrop-filter: blur(12px);
        background: rgba(7, 15, 25, 0.42);
        border: 1px solid rgba(196, 178, 128, 0.16);
        border-radius: 10px;
        bottom: 18px;
        color: #d8e6ff;
        font-size: 0.72rem;
        line-height: 1.35;
        padding: 0.50rem 0.62rem;
        pointer-events: none;
        position: absolute;
        right: 18px;
        z-index: 3;
      }

      .is-toybox-fullscreen body::after {
        opacity: 0.72;
      }

      .is-toybox-fullscreen .toybox-post-overlay,
      .is-toybox-fullscreen .toybox-stars,
      .is-toybox-fullscreen .toybox-hud,
      .is-toybox-fullscreen .toybox-controls {
        opacity: 0.64;
      }

      .is-toybox-fullscreen .toybox-debug-toggle,
      .is-toybox-fullscreen .toybox-debug-panel {
        display: none;
      }

      .is-toybox-fullscreen:not(.is-toybox-active) .toybox-fullscreen-toggle {
        opacity: 0.16;
      }

      @media (max-width: 700px) {
        .toybox-hud {
          bottom: 12px;
          left: 12px;
          max-width: min(300px, calc(100% - 24px));
        }

        .toybox-controls {
          bottom: 12px;
          right: 12px;
        }

        .toybox-fullscreen-toggle,
        .toybox-debug-toggle,
        .toybox-debug-panel {
          right: 12px;
        }

        .toybox-fullscreen-toggle {
          top: 12px;
        }

        .toybox-debug-toggle {
          top: 52px;
        }

        .toybox-debug-panel {
          top: 92px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="toybox-canvas" aria-label="3D toybox world"></canvas>
    <div class="toybox-stars" aria-hidden="true"></div>
    <div class="toybox-hud" aria-live="polite">
      <strong>Bubble Boy says</strong>
      <div id="toybox-speech">Loading the tiny island...</div>
      <div class="toybox-meta" id="toybox-meta"></div>
    </div>
    <div class="toybox-error" id="toybox-error">
      <div>
        <h1>Toybox renderer unavailable</h1>
        <p>This browser could not start WebGL for Bubble Boy's island.</p>
      </div>
    </div>
    <button class="toybox-fullscreen-toggle" id="toybox-fullscreen-toggle" type="button" aria-pressed="false" title="Toggle fullscreen">
      Fullscreen
    </button>
    <button class="toybox-debug-toggle" id="toybox-debug-toggle" type="button" aria-pressed="false">
      Physics
    </button>
    <div class="toybox-debug-panel" id="toybox-debug-panel" aria-live="polite"></div>
    <div class="toybox-controls">Move: WASD / Arrow Keys<br />Rotate: Q / E or drag</div>

    <script id="toybox-state" type="application/json">__TOYBOX_STATE_JSON__</script>
    <script>
      (() => {
        const root = document.documentElement;
        const fullscreenButton = document.getElementById("toybox-fullscreen-toggle");
        let isFullscreen = false;
        let activityTimer = window.setTimeout(() => root.classList.remove("is-toybox-active"), 2200);

        const getFullscreenElement = () => document.fullscreenElement || document.webkitFullscreenElement;
        const isDocumentFullscreen = () => Boolean(getFullscreenElement() || document.webkitIsFullScreen);

        const settleFullscreenRequest = (request) => {
          if (request && typeof request.catch === "function") {
            request.catch(syncFullscreenState);
          }
        };

        const syncFullscreenState = () => {
          isFullscreen = isDocumentFullscreen();
          root.classList.toggle("is-toybox-fullscreen", isFullscreen);
          fullscreenButton.textContent = isFullscreen ? "Exit" : "Fullscreen";
          fullscreenButton.setAttribute("aria-pressed", String(isFullscreen));
          fullscreenButton.title = isFullscreen ? "Exit fullscreen" : "Enter fullscreen";
          markUserActive();
        };

        const enterFullscreen = () => {
          const requestFullscreen = root.requestFullscreen || root.webkitRequestFullscreen || root.webkitRequestFullScreen;
          if (requestFullscreen) {
            settleFullscreenRequest(requestFullscreen.call(root));
          }
        };

        const exitFullscreen = () => {
          const exitFullscreenRequest = document.exitFullscreen || document.webkitExitFullscreen || document.webkitCancelFullScreen;
          if (exitFullscreenRequest) {
            settleFullscreenRequest(exitFullscreenRequest.call(document));
          }
        };

        const toggleFullscreen = () => {
          if (isFullscreen) {
            exitFullscreen();
          } else {
            enterFullscreen();
          }
        };

        const isEditableTarget = (target) => {
          if (!(target instanceof HTMLElement)) {
            return false;
          }

          return target.isContentEditable || ["INPUT", "SELECT", "TEXTAREA"].includes(target.tagName);
        };

        function markUserActive() {
          root.classList.add("is-toybox-active");
          window.clearTimeout(activityTimer);
          activityTimer = window.setTimeout(() => root.classList.remove("is-toybox-active"), 2200);
        }

        fullscreenButton.addEventListener("click", toggleFullscreen);
        document.addEventListener("fullscreenchange", syncFullscreenState);
        document.addEventListener("webkitfullscreenchange", syncFullscreenState);
        document.addEventListener("mousemove", markUserActive, { passive: true });
        document.addEventListener("pointerdown", markUserActive, { passive: true });
        document.addEventListener("keydown", (event) => {
          markUserActive();

          if (event.key.toLowerCase() !== "f" || event.repeat || event.ctrlKey || event.metaKey || event.altKey || isEditableTarget(event.target)) {
            return;
          }

          toggleFullscreen();
        });

        syncFullscreenState();
      })();
    </script>
    <script type="module" src="/static/toybox/main.js"></script>
  </body>
</html>
